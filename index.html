<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCV - Registro de Inspecciones Post-Sismo</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="assets/img/logo-ucv.png" alt="UCV" height="40" class="d-inline-block align-text-top me-2">
                <strong>UCV</strong> - Inspecciones Post-Sismo
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html"><i class="fas fa-home"></i> Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="btnNuevaInspeccion"><i class="fas fa-plus-circle"></i> Nueva Inspección</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-md-6">
                <h4><i class="fas fa-building"></i> Listado de Edificaciones</h4>
                <p class="text-muted">Total: <span id="totalEdificios">0</span> registros</p>
            </div>
            <div class="col-md-6">
                <div class="input-group">
                    <input type="text" class="form-control" id="buscador" placeholder="Buscar por nombre o ID...">
                    <button class="btn btn-outline-secondary" type="button" id="btnBuscar"><i class="fas fa-search"></i></button>
                </div>
                <div class="mt-2 d-flex gap-2 flex-wrap">
                    <span>Filtros:</span>
                    <select class="form-select form-select-sm w-auto" id="filtroPrioridad">
                        <option value="">Todas las prioridades</option>
                        <option value="Prioridad Tipo I">Tipo I (Alta)</option>
                        <option value="Prioridad Tipo II">Tipo II (Media)</option>
                        <option value="Prioridad Tipo III">Tipo III (Baja)</option>
                    </select>
                    <select class="form-select form-select-sm w-auto" id="filtroEstatus">
                        <option value="">Todos los estatus</option>
                        <option value="Inspeccionado">Inspeccionado</option>
                        <option value="Pendiente">Pendiente</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Grilla de edificios -->
        <div class="row" id="contenedorEdificios">
            <!-- Las tarjetas se generan con JS -->
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Módulos Firestore y App -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/data-edificios.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
